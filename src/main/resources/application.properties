spring.application.name=udas

# 端口号
server.port=8080

# 数据库连接（MySQL）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/shyh?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=1234

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.cyn.udas.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 日志
logging.level.com.cyn.udas.mapper=debug
